name: Publish Open VSX

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - README.md
      - .vscodeignore
      - src/**
      - media/**
      - scripts/**
      - tsconfig.json
      - tsup.config.ts
      - .github/workflows/openvsx-publish.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Package VSIX
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: notewise-editor-vsix
          path: "*.vsix"
          if-no-files-found: error

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "::error::Missing OVSX_PAT repository secret"
            exit 1
          fi
          VERSION="$(node -p "require('./package.json').version")"
          version_exists() {
            node -e "fetch('https://open-vsx.org/api/rockuen/notewise-editor/' + process.argv[1]).then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))" "$VERSION"
          }
          if version_exists; then
            echo "Open VSX already has rockuen.notewise-editor v${VERSION}; skipping publish."
            exit 0
          fi
          for attempt in 1 2 3 4 5 6 7 8; do
            echo "Open VSX publish attempt ${attempt}/8"
            if npx ovsx -p "$OVSX_PAT" --debug publish *.vsix --skip-duplicate; then
              exit 0
            fi
            if version_exists; then
              echo "Open VSX now has rockuen.notewise-editor v${VERSION}; treating publish as successful."
              exit 0
            fi
            sleep $((attempt * 20))
          done
          echo "::error::Open VSX publish failed after 5 attempts"
          exit 1
